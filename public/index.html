<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:#1D9E75; --accent-light:#E1F5EE; --accent-mid:#0F6E56;
      --warn:#BA7517; --warn-light:#FAEEDA;
      --danger:#A32D2D; --danger-light:#FCEBEB;
      --info:#185FA5; --info-light:#E6F1FB;
      --bg:#f9f9f8; --surface:#ffffff;
      --border:rgba(0,0,0,0.12); --border-strong:rgba(0,0,0,0.22);
      --text:#1a1a1a; --text-muted:#6b6b6b;
      --radius:10px; --radius-lg:14px;
      --sans:'DM Sans',system-ui,sans-serif;
      --mono:'DM Mono',monospace;
      --serif:'Instrument Serif',Georgia,serif;
    }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; }
    .shell { max-width:920px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

    /* Header */
    .header { display:flex; align-items:baseline; gap:14px; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
    .header h1 { font-family:var(--serif); font-size:30px; font-weight:400; }
    .header h1 em { color:var(--accent); font-style:italic; }
    .header-sub { font-family:var(--mono); font-size:12px; color:var(--text-muted); }

    /* Steps */
    .steps { display:flex; gap:8px; align-items:center; margin-bottom:1.75rem; }
    .step-pill { font-family:var(--mono); font-size:11px; padding:3px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); }
    .step-pill.active { background:var(--accent-light); color:var(--accent-mid); border-color:#9FE1CB; }
    .step-pill.done   { background:var(--accent); color:white; border-color:var(--accent); }
    .step-arrow { font-size:11px; color:var(--text-muted); }

    /* Upload */
    .upload-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    @media(max-width:620px){ .upload-grid{ grid-template-columns:1fr; } }
    .field-label { display:block; font-size:11px; font-weight:500; font-family:var(--mono); text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:8px; }

    .drop-zone { border:1.5px dashed var(--border-strong); border-radius:var(--radius); padding:20px 16px; text-align:center; cursor:pointer; background:#fafafa; transition:all 0.15s; margin-bottom:8px; user-select:none; }
    .drop-zone:hover { border-color:var(--accent); background:var(--accent-light); }
    .drop-zone.over   { border-color:var(--accent); background:var(--accent-light); }
    .drop-zone.loaded { border-style:solid; border-color:var(--accent); background:var(--accent-light); }
    .drop-icon { font-size:26px; margin-bottom:6px; }
    .drop-main { font-size:13px; font-weight:500; margin-bottom:3px; }
    .drop-sub  { font-size:11px; font-family:var(--mono); color:var(--text-muted); }
    .drop-name { font-size:12px; font-family:var(--mono); font-weight:500; margin-top:8px; display:none; }
    .divider-text { font-size:11px; font-family:var(--mono); color:var(--text-muted); text-align:center; margin-bottom:6px; }

    textarea { width:100%; resize:vertical; font-family:var(--mono); font-size:12.5px; line-height:1.7; padding:12px 14px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); transition:border-color 0.15s; }
    textarea:focus { outline:none; border-color:var(--accent); }

    /* Buttons */
    .btn-primary { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:var(--radius); font-size:15px; font-weight:500; font-family:var(--sans); cursor:pointer; transition:background 0.15s; margin-top:4px; }
    .btn-primary:hover { background:var(--accent-mid); }
    .btn-secondary { padding:9px 16px; background:var(--surface); color:var(--text); border:1px solid var(--border-strong); border-radius:var(--radius); font-size:13px; font-family:var(--sans); cursor:pointer; }
    .btn-secondary:hover { background:#f0f0ef; }
    .btn-accent { padding:9px 16px; background:var(--accent); color:white; border:none; border-radius:var(--radius); font-size:13px; font-family:var(--sans); cursor:pointer; }
    .btn-accent:hover { background:var(--accent-mid); }
    .btn-accent:disabled { opacity:0.5; cursor:not-allowed; }

    .error-box { display:none; padding:11px 14px; background:var(--danger-light); border:1px solid #F09595; border-radius:var(--radius); font-size:13px; color:var(--danger); font-family:var(--mono); margin-bottom:12px; }

    /* Loading */
    #sec-load { display:none; margin-top:2.5rem; }
    .progress-track { width:100%; height:3px; background:#e5e5e3; border-radius:2px; overflow:hidden; margin-bottom:14px; }
    .progress-bar { height:100%; background:var(--accent); border-radius:2px; width:5%; transition:width 0.7s ease; }
    .progress-text { font-family:var(--mono); font-size:12px; color:var(--text-muted); text-align:center; }

    /* Results */
    #sec-results { display:none; }
    .tab-row { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:1.75rem; overflow-x:auto; }
    .tab-btn { padding:9px 16px; font-size:13px; font-weight:500; color:var(--text-muted); border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; background:none; border-top:none; border-left:none; border-right:none; font-family:var(--sans); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Score cards */
    .score-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.5rem; }
    @media(max-width:500px){ .score-grid{ grid-template-columns:repeat(2,1fr); } }
    .score-card { background:#f4f4f2; border-radius:var(--radius); padding:14px; text-align:center; }
    .score-num { font-size:30px; font-weight:500; line-height:1; margin-bottom:5px; }
    .score-lbl { font-size:11px; font-family:var(--mono); color:var(--text-muted); }
    .c-green { color:var(--accent); } .c-amber { color:var(--warn); } .c-red { color:var(--danger); }

    .sec-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .badge { display:inline-block; font-size:10px; font-family:var(--mono); font-weight:500; padding:2px 8px; border-radius:20px; }
    .badge-green { background:var(--accent-light); color:var(--accent-mid); }
    .badge-amber { background:var(--warn-light); color:var(--warn); }
    .badge-red   { background:var(--danger-light); color:var(--danger); }
    .badge-blue  { background:var(--info-light); color:var(--info); }

    .assessment-box { background:#f4f4f2; border-radius:var(--radius); padding:14px 16px; margin-bottom:1.25rem; }
    .assessment-box .mini-lbl { font-size:10px; font-family:var(--mono); color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
    .assessment-box p { font-size:13.5px; line-height:1.7; }

    .metrics-box { background:var(--warn-light); border:1px solid #FAC775; border-radius:var(--radius); padding:13px 15px; margin-bottom:1.25rem; }
    .metrics-box .mtitle { font-size:13px; font-weight:500; color:var(--warn); margin-bottom:6px; }
    .metrics-box ul { padding-left:18px; }
    .metrics-box li { font-size:12px; font-family:var(--mono); color:var(--warn); margin-bottom:4px; line-height:1.5; }

    .mini-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
    .mini-stat { padding:11px 13px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); }
    .mini-stat .ms-lbl { font-size:10px; font-family:var(--mono); color:var(--text-muted); margin-bottom:3px; }
    .mini-stat .ms-val { font-size:22px; font-weight:500; }

    /* Bullets */
    .bullet-card { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
    .b-before { padding:11px 14px; background:#fff5f5; font-size:13px; color:#555; line-height:1.55; border-bottom:1px solid var(--border); }
    .b-section { font-size:10px; font-family:var(--mono); color:var(--text-muted); display:block; margin-bottom:5px; }
    .b-after { padding:11px 14px; background:#f0faf5; font-size:13px; color:var(--text); line-height:1.55; }

    /* Keywords */
    .kw-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.25rem; }
    .kw { padding:4px 11px; border-radius:20px; font-size:12px; font-family:var(--mono); border:1px solid; }
    .kw-ok { background:var(--accent-light); color:var(--accent-mid); border-color:#9FE1CB; }
    .kw-no { background:var(--danger-light); color:var(--danger); border-color:#F09595; }
    .kw-split { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:500px){ .kw-split{ grid-template-columns:1fr; } }

    /* ATS */
    .iss-item { display:flex; gap:12px; padding:11px 14px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; background:var(--surface); align-items:flex-start; }
    .iss-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
    .iss-cat  { font-size:10px; font-family:var(--mono); color:var(--text-muted); margin-bottom:3px; }
    .iss-desc { font-size:13px; line-height:1.5; margin-bottom:4px; }
    .iss-fix  { font-size:12px; font-family:var(--mono); color:var(--accent-mid); }

    /* Gaps */
    .gap-item { padding:13px 15px; border:1px solid var(--border); border-left:3px solid var(--warn); border-radius:var(--radius); margin-bottom:8px; background:var(--surface); }
    .gap-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .gap-skill { font-size:13px; font-weight:500; }
    .gap-sug { font-size:12px; color:var(--text-muted); line-height:1.5; }

    /* Full resume */
    .resume-pre { font-family:var(--mono); font-size:12px; line-height:1.85; white-space:pre-wrap; color:var(--text); background:#fafaf9; border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; max-height:540px; overflow-y:auto; margin-bottom:10px; }
    .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
    .reset-row { margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); }

    /* Gap placeholders */
    .ph-mark {
      background: #FEF3C7;
      border: 1px solid #F59E0B;
      border-radius: 4px;
      color: #92400E;
      font-style: italic;
      padding: 1px 4px;
      white-space: pre-wrap;
    }

    /* Page count banner */
    .page-banner { border-radius:var(--radius); padding:11px 14px; display:flex; align-items:center; gap:10px; margin-top:12px; }
    .page-banner.good { background:var(--accent-light); border:1px solid #9FE1CB; }
    .page-banner.warn { background:var(--warn-light); border:1px solid #FAC775; }
    .page-banner .pb-icon { font-size:18px; }
    .page-banner .pb-title { font-size:12px; font-weight:500; margin-bottom:2px; }
    .page-banner.good .pb-title { color:var(--accent-mid); }
    .page-banner.warn .pb-title { color:var(--warn); }
    .page-banner .pb-sub { font-size:12px; }
    .page-banner.good .pb-sub { color:var(--accent-mid); }
    .page-banner.warn .pb-sub { color:var(--warn); }

    .trimmed-box { margin-top:10px; background:#f4f4f2; border-radius:var(--radius); padding:11px 14px; }
    .trimmed-box .t-lbl { font-size:10px; font-family:var(--mono); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
    .trimmed-box ul { padding-left:16px; }
    .trimmed-box li { font-size:12px; color:var(--text-muted); margin-bottom:3px; }
  </style>
</head>
<body>
<div class="shell">

  <div class="header">
    <h1>Resume <em>Optimizer</em></h1>
    <span class="header-sub">ATS-ready · Achievement-focused · 2-page target</span>
    <a href="/vault.html" style="margin-left:auto;padding:7px 14px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius);font-size:12px;font-family:var(--mono);color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;">🗄️ My Vault</a>
  </div>

  <div class="steps">
    <span class="step-pill active" id="sp1">1 · Upload</span>
    <span class="step-arrow">→</span>
    <span class="step-pill" id="sp2">2 · Analyze</span>
    <span class="step-arrow">→</span>
    <span class="step-pill" id="sp3">3 · Results</span>
  </div>

  <!-- INPUT -->
  <div id="sec-input">
    <div class="upload-grid">
      <div>
        <span class="field-label">Resume</span>
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon" id="drop-icon">📄</div>
          <div class="drop-main">Click to upload resume</div>
          <div class="drop-sub">PDF · DOCX · TXT — or drag &amp; drop</div>
          <div class="drop-name" id="drop-name"></div>
        </div>
        <input type="file" id="file-inp" accept=".pdf,.docx,.txt" style="display:none">
        <div class="divider-text">— or paste below —</div>
        <textarea id="resume-ta" rows="9" placeholder="Paste resume text here..."></textarea>
      </div>
      <div>
        <span class="field-label">Job Description</span>
        <textarea id="jd-ta" rows="18" placeholder="Paste the full job description here..."></textarea>
      </div>
    </div>
    <div class="error-box" id="inp-err"></div>
    <button class="btn-primary" id="analyze-btn">Analyze &amp; Optimize Resume →</button>
  </div>

  <!-- LOADING -->
  <div id="sec-load">
    <div class="progress-track"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-text" id="prog-txt">Starting analysis...</div>
  </div>

  <!-- RESULTS -->
  <div id="sec-results">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="bullets">Rewritten Bullets</button>
      <button class="tab-btn" data-tab="keywords">Keywords</button>
      <button class="tab-btn" data-tab="ats">ATS Checks</button>
      <button class="tab-btn" data-tab="gaps">Gap Analysis</button>
      <button class="tab-btn" data-tab="full">Full Resume</button>
      <button class="tab-btn" data-tab="cover">✉️ Cover Letter</button>
    </div>
    <div id="tab-overview" class="tab-panel active"></div>
    <div id="tab-bullets"  class="tab-panel"></div>
    <div id="tab-keywords" class="tab-panel"></div>
    <div id="tab-ats"      class="tab-panel"></div>
    <div id="tab-gaps"     class="tab-panel"></div>
    <div id="tab-full"     class="tab-panel"></div>
    <div id="tab-cover"    class="tab-panel"></div>
    <div class="reset-row">
      <button class="btn-secondary" id="reset-btn">← Analyze Another Resume</button>
    </div>
  </div>

</div>

<script>
// ── Init ─────────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let uploadedFileType = 'txt';

// ── Drop zone wiring (all in JS, no inline handlers) ─────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInp  = document.getElementById('file-inp');

dropZone.addEventListener('click', () => fileInp.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInp.addEventListener('change', () => {
  if (fileInp.files[0]) loadFile(fileInp.files[0]);
});

// ── Tab wiring ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Analyze button ────────────────────────────────────────────────────────────
document.getElementById('analyze-btn').addEventListener('click', runAnalysis);
document.getElementById('reset-btn').addEventListener('click', reset);

// ── File reading ──────────────────────────────────────────────────────────────
async function loadFile(file) {
  uploadedFileType = file.name.split('.').pop().toLowerCase();
  const dn = document.getElementById('drop-name');
  dn.textContent = '⏳ Reading ' + file.name + '...';
  dn.style.color = '#BA7517';
  dn.style.display = 'block';

  try {
    let txt = '';
    if (uploadedFileType === 'txt') {
      txt = await file.text();
    } else if (uploadedFileType === 'docx') {
      const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      txt = result.value;
    } else if (uploadedFileType === 'pdf') {
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page    = await pdf.getPage(i);
        const content = await page.getTextContent();
        txt += content.items.map(x => x.str).join(' ') + '\n';
      }
    } else {
      txt = await file.text();
    }

    document.getElementById('resume-ta').value = txt.trim();
    dn.textContent = '✓ ' + file.name;
    dn.style.color = '#0F6E56';
    dropZone.classList.add('loaded');
    document.getElementById('drop-icon').textContent =
      uploadedFileType === 'pdf' ? '📕' : uploadedFileType === 'docx' ? '📘' : '📄';
  } catch (e) {
    dn.textContent = '✗ Could not read file: ' + e.message;
    dn.style.color = '#A32D2D';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('sp' + i);
    el.className = 'step-pill' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}

function setP(pct, msg) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-txt').textContent  = msg;
}

function showErr(msg) {
  const el = document.getElementById('inp-err');
  el.textContent   = msg;
  el.style.display = 'block';
}

function sc(n) { return n >= 75 ? 'c-green' : n >= 50 ? 'c-amber' : 'c-red'; }

function sanitizeJSON(str) {
  let result = '', inString = false, escaped = false;
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    if (escaped)    { result += ch; escaped = false; continue; }
    if (ch === '\\') { result += ch; escaped = true;  continue; }
    if (ch === '"')  { inString = !inString; result += ch; continue; }
    if (inString) {
      if (ch === '\n') { result += '\\n'; continue; }
      if (ch === '\r') { result += '\\r'; continue; }
      if (ch === '\t') { result += '\\t'; continue; }
      if (ch.charCodeAt(0) < 32) { result += ' '; continue; }
    }
    result += ch;
  }
  return result;
}

function reset() {
  document.getElementById('sec-input').style.display   = 'block';
  document.getElementById('sec-results').style.display = 'none';
  document.getElementById('sec-load').style.display    = 'none';
  document.getElementById('inp-err').style.display     = 'none';
  document.getElementById('resume-ta').value = '';
  document.getElementById('jd-ta').value     = '';
  document.getElementById('drop-name').style.display   = 'none';
  document.getElementById('drop-icon').textContent = '📄';
  dropZone.classList.remove('loaded');
  fileInp.value = '';
  uploadedFileType = 'txt';
  setStep(1);
  document.querySelectorAll('.tab-btn')[0].click();
}

// ── Analysis ──────────────────────────────────────────────────────────────────
async function runAnalysis() {
  const resume = document.getElementById('resume-ta').value.trim();
  const jd     = document.getElementById('jd-ta').value.trim();
  document.getElementById('inp-err').style.display = 'none';

  if (!resume)            { showErr('Please upload a resume file or paste your resume text.'); return; }
  if (resume.length < 80) { showErr('Resume looks too short — please paste the full text.'); return; }
  if (!jd)                { showErr('Please paste the job description.'); return; }

  document.getElementById('sec-input').style.display = 'none';
  document.getElementById('sec-load').style.display  = 'block';
  setStep(2);

  const steps = [
    [10, 'Reading resume content...'],
    [22, 'Extracting job description keywords...'],
    [38, 'Identifying weak bullet points...'],
    [54, 'Rewriting with achievement framing...'],
    [70, 'Running ATS compatibility checks...'],
    [84, 'Detecting skill & experience gaps...'],
    [94, 'Trimming to 2-page target...'],
  ];
  let si = 0;
  const iv = setInterval(() => { if (si < steps.length) setP(...steps[si++]); }, 1800);

  const prompt = `You are an expert resume optimizer and ATS specialist. Analyze the resume against the job description. Return ONLY valid JSON — no markdown fences, no extra text.

RESUME:
${resume.slice(0, 6000)}

JOB DESCRIPTION:
${jd.slice(0, 3000)}

Return this exact JSON:
{
  "scores": { "overall": 0, "ats": 0, "keywords": 0, "achievements": 0 },
  "summary": "2-3 sentence honest assessment",
  "rewritten_bullets": [
    { "section": "Company Name", "original": "exact original bullet", "improved": "rewritten version", "issue": "vague|no metrics|passive|missing leadership" }
  ],
  "metrics_prompts": ["specific question to get a missing number"],
  "keywords": {
    "top15": ["k1","k2","k3","k4","k5","k6","k7","k8","k9","k10","k11","k12","k13","k14","k15"],
    "present": ["keywords already in resume"],
    "missing": ["keywords not in resume"]
  },
  "ats_issues": [
    { "severity": "high|medium|low", "category": "Title|Keywords|Formatting|Language|Structure", "description": "specific issue", "fix": "exact fix" }
  ],
  "gaps": [
    { "skill": "skill name", "importance": "critical|important|nice-to-have", "suggestion": "concrete suggestion" }
  ],
  "page_count_estimate": "1 page|2 pages|3+ pages",
  "trimmed_content": ["describe what was shortened or cut to hit the 2-page target"],
  "optimized_resume": "Full optimized resume preserving the EXACT original layout and sections. Only improve content. Use real newlines."
}

Rules:
- Rewrite 5-7 bullets across multiple jobs
- Exactly 15 keywords from the JD
- Flag any title mismatch as HIGH severity
- Keep all original sections in the same order
- TARGET LENGTH: Fill as close to exactly 2 Word pages as possible — not under, not over. A recruiter wants to see a full, confident resume. Follow these rules:
  * Summary: 3 punchy sentences max
  * Most recent 2 jobs: 4 strong bullets each
  * Jobs 3-5 years ago: 2-3 bullets each
  * Jobs 5+ years ago: 1-2 bullets each — keep them but be concise
  * Include ALL jobs from the original resume — never drop a job entry entirely
  * Use bullet points only — no paragraph-style descriptions
  * Each bullet: one clear achievement, max 120 characters, strong verb, metric where possible
  * List what you shortened in trimmed_content
- SKILLS SECTION: Rewrite into compact single-line categories formatted as "Category: skill · skill · skill". Keep max 4-5 categories total. Only include skills that are genuinely relevant to this specific JD — do not pad. Add gap skills that fit naturally. Each line max 110 characters. Most relevant category goes first.`;

  try {
    const resp = await fetch('/analyze', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 6000, messages: [{ role: 'user', content: prompt }] })
    });

    clearInterval(iv);
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || 'Server error ' + resp.status); }

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    let raw = data.content.map(b => b.text || '').join('').trim();
    raw = raw.replace(/^```json\s*/,'').replace(/^```/,'').replace(/```$/,'').trim();
    raw = sanitizeJSON(raw);
    const result = JSON.parse(raw);
    _vaultData = result; // cache for vault save

    setP(100, 'Done!');
    setTimeout(() => {
      document.getElementById('sec-load').style.display    = 'none';
      document.getElementById('sec-results').style.display = 'block';
      setStep(3);
      renderResults(result);
    }, 400);

  } catch(e) {
    clearInterval(iv);
    document.getElementById('sec-load').style.display  = 'none';
    document.getElementById('sec-input').style.display = 'block';
    setStep(1);
    showErr('Error: ' + e.message);
  }
}

async function downloadFormatted() {
  const text  = document.getElementById('opt-pre').textContent;
  const fmt   = uploadedFileType;
  const btn   = document.getElementById('dl-btn');
  const errEl = document.getElementById('dl-err');
  errEl.style.display = 'none';

  // Strip placeholder markers for the download — leave the example text as a reminder
  const cleanText = text.replace(/\[PLACEHOLDER:\s*/g, '[TODO: ').replace(/\]/g, ']');

  if (fmt === 'txt') {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([cleanText], { type:'text/plain' }));
    a.download = 'resume_optimized.txt'; a.click(); return;
  }

  btn.textContent = '⏳ Generating...'; btn.disabled = true;
  const endpoint = fmt === 'docx' ? '/generate-docx' : '/generate-pdf';
  try {
    const resp = await fetch(endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error||'Server error'); }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(await resp.blob());
    a.download = 'resume_optimized.' + fmt; a.click();
    btn.textContent = '✓ Downloaded'; setTimeout(()=>{ btn.textContent='⬇ Download .'+fmt; btn.disabled=false; }, 3000);
  } catch(e) {
    errEl.textContent = 'Download failed: ' + e.message; errEl.style.display='block';
    btn.textContent = '⬇ Download .'+fmt; btn.disabled=false;
  }
}

async function generateCoverLetter() {
  const name     = document.getElementById('cl-name').value.trim();
  const manager  = document.getElementById('cl-manager').value.trim();
  const company  = document.getElementById('cl-company').value.trim();
  const tone     = document.getElementById('cl-tone').value;
  const emphasis = document.getElementById('cl-emphasis').value.trim();
  const errEl    = document.getElementById('cl-err');
  errEl.style.display = 'none';

  if (!name)    { errEl.textContent = 'Please enter your name.'; errEl.style.display = 'block'; return; }
  if (!company) { errEl.textContent = 'Please enter the company name.'; errEl.style.display = 'block'; return; }

  const resumeText = _vaultData && _vaultData.optimized_resume
    ? _vaultData.optimized_resume.replace(/\n/g, '
')
    : document.getElementById('resume-ta') ? document.getElementById('resume-ta').value : '';

  const jd = document.getElementById('jd-ta') ? document.getElementById('jd-ta').value : '';

  document.getElementById('cl-loading').style.display = 'block';
  document.getElementById('cl-result').style.display  = 'none';
  document.getElementById('cl-generate-btn').disabled = true;

  const toneMap = {
    professional:  'professional, confident, and polished',
    enthusiastic:  'enthusiastic, warm, and genuine',
    concise:       'concise, direct, and to the point — no fluff',
    executive:     'executive, strategic, and leadership-focused'
  };

  const prompt = `Write a compelling cover letter for a job application. Return ONLY the cover letter text — no explanation, no subject line, no markdown.

CANDIDATE RESUME:
${resumeText.slice(0, 4000)}

JOB DESCRIPTION:
${jd.slice(0, 2000)}

PARAMETERS:
- Candidate name: ${name}
- Company: ${company}
- Hiring manager: ${manager || 'Hiring Manager'}
- Tone: ${toneMap[tone]}
- Special emphasis: ${emphasis || 'none'}

RULES:
- Max 4 paragraphs, max 350 words total
- Opening: hook that shows genuine interest in THIS company/role specifically
- Body paragraph 1: strongest achievement from resume most relevant to this JD
- Body paragraph 2: second key strength + why this company/role fits the candidate's trajectory
- Closing: confident call to action, no begging
- Use "Dear ${manager ? manager : 'Hiring Team'}," as salutation
- End with "Sincerely,\n${name}"
- Never use generic phrases like "I am writing to apply" or "I believe I would be a great fit"
- Make every sentence earn its place`;

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const text = data.content.map(b => b.text || '').join('').trim();

    document.getElementById('cl-text').textContent = text;
    document.getElementById('cl-result').style.display  = 'block';
    document.getElementById('cl-loading').style.display = 'none';
    document.getElementById('cl-generate-btn').disabled = false;

  } catch(e) {
    document.getElementById('cl-loading').style.display = 'none';
    document.getElementById('cl-generate-btn').disabled = false;
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

function copyCoverLetter(btn) {
  const text = document.getElementById('cl-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}

function downloadCoverLetter() {
  const text    = document.getElementById('cl-text').textContent;
  const company = document.getElementById('cl-company').value.trim().replace(/\s+/g, '_') || 'company';
  const a = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = `cover_letter_${company}.txt`;
  a.click();
}

// ── Vault ─────────────────────────────────────────────────────────────────────
let _vaultData = null; // store analysis data for vault save

function showSaveVaultModal() {
  // Create modal if it doesn't exist
  let modal = document.getElementById('vault-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'vault-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;';
    modal.innerHTML = `
      <div style="background:white;border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="font-family:var(--serif);font-size:22px;margin-bottom:6px;">Save to <em style="color:#1D9E75;font-style:italic;">Vault</em></div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;">Tag this resume so you can find it before an interview.</p>
        <div style="margin-bottom:12px;">
          <label style="display:block;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:5px;">Company Name *</label>
          <input id="vault-company" type="text" placeholder="e.g. Google, Stripe, Anthropic..." style="width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:var(--radius);font-size:14px;font-family:var(--sans);outline:none;">
        </div>
        <div style="margin-bottom:1.5rem;">
          <label style="display:block;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:5px;">Job Title</label>
          <input id="vault-jobtitle" type="text" placeholder="e.g. Engineering Manager" style="width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:var(--radius);font-size:14px;font-family:var(--sans);outline:none;">
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="saveToVault()" style="flex:1;padding:11px;background:#1D9E75;color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;font-family:var(--sans);cursor:pointer;">Save Resume</button>
          <button onclick="document.getElementById('vault-modal').remove()" style="padding:11px 16px;background:white;border:1px solid rgba(0,0,0,0.2);border-radius:var(--radius);font-size:14px;font-family:var(--sans);cursor:pointer;">Cancel</button>
        </div>
        <div id="vault-modal-err" style="display:none;margin-top:8px;font-size:12px;color:#A32D2D;font-family:var(--mono);"></div>
      </div>`;
    document.body.appendChild(modal);
    // Close on backdrop click
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  }
  document.getElementById('vault-modal').style.display = 'flex';
  document.getElementById('vault-company').focus();
}

async function saveToVault() {
  const company  = document.getElementById('vault-company').value.trim();
  const jobTitle = document.getElementById('vault-jobtitle').value.trim();
  const errEl    = document.getElementById('vault-modal-err');
  errEl.style.display = 'none';

  if (!company) { errEl.textContent = 'Please enter a company name.'; errEl.style.display = 'block'; return; }

  const resumeText = document.getElementById('opt-pre') ? document.getElementById('opt-pre').innerText : '';
  const payload = {
    company,
    jobTitle,
    resumeText,
    analysisScores: _vaultData ? _vaultData.scores : null,
    keywords: _vaultData && _vaultData.keywords ? _vaultData.keywords.top15 : []
  };

  try {
    const resp = await fetch('/vault/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Save failed');

    document.getElementById('vault-modal').remove();
    const successEl = document.getElementById('vault-success');
    if (successEl) {
      successEl.textContent = '✓ Saved to vault for ' + company + '. View it anytime in My Vault before your interview.';
      successEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message; errEl.style.display = 'block';
  }
}
</script>
