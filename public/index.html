<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --accent-mid: #0F6E56;
      --warn: #BA7517;
      --warn-light: #FAEEDA;
      --danger: #A32D2D;
      --danger-light: #FCEBEB;
      --info: #185FA5;
      --info-light: #E6F1FB;
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.22);
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --radius: 10px;
      --radius-lg: 14px;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 400;
      color: var(--text);
    }
    .header h1 em { color: var(--accent); font-style: italic; }
    .header-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Steps ── */
    .steps {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 1.75rem;
    }
    .step-pill {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
    }
    .step-pill.active { background: var(--accent-light); color: var(--accent-mid); border-color: #9FE1CB; }
    .step-pill.done   { background: var(--accent); color: white; border-color: var(--accent); }
    .step-arrow { font-size: 11px; color: var(--text-muted); }

    /* ── Upload grid ── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 620px) { .upload-grid { grid-template-columns: 1fr; } }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
      transition: all 0.15s;
      margin-bottom: 8px;
      user-select: none;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
    .drop-zone.loaded { border-style: solid; border-color: var(--accent); background: var(--accent-light); }
    .drop-icon { font-size: 26px; margin-bottom: 6px; }
    .drop-main { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .drop-sub  { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }
    .drop-name { font-size: 12px; font-family: var(--mono); color: var(--accent-mid); font-weight: 500; margin-top: 8px; display: none; }

    .divider-text {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      resize: vertical;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-mid); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      padding: 9px 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-secondary:hover { background: #f0f0ef; }

    .btn-accent {
      padding: 9px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-accent:hover { background: var(--accent-mid); }

    /* ── Error ── */
    .error-box {
      display: none;
      padding: 11px 14px;
      background: var(--danger-light);
      border: 1px solid #F09595;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--danger);
      font-family: var(--mono);
      margin-bottom: 12px;
    }

    /* ── Loading ── */
    #sec-load { display: none; margin-top: 2.5rem; }
    .progress-track {
      width: 100%;
      height: 3px;
      background: #e5e5e3;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 5%;
      transition: width 0.7s ease;
    }
    .progress-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Results ── */
    #sec-results { display: none; }

    .tab-row {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      background: none;
      border-top: none; border-left: none; border-right: none;
      font-family: var(--sans);
      transition: color 0.1s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Score cards ── */
    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 500px) { .score-grid { grid-template-columns: repeat(2,1fr); } }
    .score-card {
      background: #f4f4f2;
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .score-num { font-size: 30px; font-weight: 500; line-height: 1; margin-bottom: 5px; }
    .score-lbl { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }
    .c-green { color: var(--accent); }
    .c-amber { color: var(--warn); }
    .c-red   { color: var(--danger); }

    /* ── Section title ── */
    .sec-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-green  { background: var(--accent-light); color: var(--accent-mid); }
    .badge-amber  { background: var(--warn-light); color: var(--warn); }
    .badge-red    { background: var(--danger-light); color: var(--danger); }
    .badge-blue   { background: var(--info-light); color: var(--info); }

    /* ── Assessment box ── */
    .assessment-box {
      background: #f4f4f2;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 1.25rem;
    }
    .assessment-box .mini-lbl {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .assessment-box p { font-size: 13.5px; line-height: 1.7; }

    /* ── Metrics prompt ── */
    .metrics-box {
      background: var(--warn-light);
      border: 1px solid #FAC775;
      border-radius: var(--radius);
      padding: 13px 15px;
      margin-bottom: 1.25rem;
    }
    .metrics-box .mtitle { font-size: 13px; font-weight: 500; color: var(--warn); margin-bottom: 6px; }
    .metrics-box ul { padding-left: 18px; }
    .metrics-box li { font-size: 12px; font-family: var(--mono); color: var(--warn); margin-bottom: 4px; line-height: 1.5; }

    /* ── Mini stat row ── */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .mini-stat {
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .mini-stat .ms-lbl { font-size: 10px; font-family: var(--mono); color: var(--text-muted); margin-bottom: 3px; }
    .mini-stat .ms-val { font-size: 22px; font-weight: 500; }

    /* ── Bullet cards ── */
    .bullet-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .b-before {
      padding: 11px 14px;
      background: #fff5f5;
      font-size: 13px;
      color: #555;
      line-height: 1.55;
      border-bottom: 1px solid var(--border);
    }
    .b-section {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      display: block;
      margin-bottom: 5px;
    }
    .b-after {
      padding: 11px 14px;
      background: #f0faf5;
      font-size: 13px;
      color: var(--text);
      line-height: 1.55;
    }

    /* ── Keywords ── */
    .kw-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
    .kw {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--mono);
      border: 1px solid;
    }
    .kw-ok { background: var(--accent-light); color: var(--accent-mid); border-color: #9FE1CB; }
    .kw-no { background: var(--danger-light); color: var(--danger); border-color: #F09595; }

    .kw-split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .kw-split { grid-template-columns: 1fr; } }

    /* ── ATS issues ── */
    .iss-item {
      display: flex;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      background: var(--surface);
      align-items: flex-start;
    }
    .iss-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .iss-cat { font-size: 10px; font-family: var(--mono); color: var(--text-muted); margin-bottom: 3px; }
    .iss-desc { font-size: 13px; line-height: 1.5; margin-bottom: 4px; }
    .iss-fix { font-size: 12px; font-family: var(--mono); color: var(--accent-mid); }

    /* ── Gaps ── */
    .gap-item {
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--warn);
      border-radius: var(--radius);
      margin-bottom: 8px;
      background: var(--surface);
    }
    .gap-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .gap-skill { font-size: 13px; font-weight: 500; }
    .gap-sug { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* ── Full resume ── */
    .resume-pre {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.85;
      white-space: pre-wrap;
      color: var(--text);
      background: #fafaf9;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      max-height: 540px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Reset row ── */
    .reset-row {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <h1>Resume <em>Optimizer</em></h1>
    <span class="header-sub">ATS-ready · Achievement-focused · Format-preserved</span>
  </div>

  <!-- STEPS -->
  <div class="steps">
    <span class="step-pill active" id="sp1">1 · Upload</span>
    <span class="step-arrow">→</span>
    <span class="step-pill" id="sp2">2 · Analyze</span>
    <span class="step-arrow">→</span>
    <span class="step-pill" id="sp3">3 · Results</span>
  </div>

  <!-- INPUT SECTION -->
  <div id="sec-input">
    <div class="upload-grid">

      <!-- Resume -->
      <div>
        <span class="field-label">Resume</span>
        <div class="drop-zone" id="drop-zone"
          onclick="document.getElementById('file-inp').click()"
          ondragover="event.preventDefault();this.classList.add('over')"
          ondragleave="this.classList.remove('over')"
          ondrop="event.preventDefault();this.classList.remove('over');loadFile(event.dataTransfer.files[0])">
          <div class="drop-icon" id="drop-icon">📄</div>
          <div class="drop-main">Click to upload resume</div>
          <div class="drop-sub">PDF · DOCX · TXT — or drag &amp; drop</div>
          <div class="drop-name" id="drop-name"></div>
        </div>
        <input type="file" id="file-inp" accept=".pdf,.docx,.txt" style="display:none" onchange="loadFile(this.files[0])">
        <div class="divider-text">— or paste below —</div>
        <textarea id="resume-ta" rows="9" placeholder="Paste resume text here..."></textarea>
      </div>

      <!-- JD -->
      <div>
        <span class="field-label">Job Description</span>
        <textarea id="jd-ta" rows="18" placeholder="Paste the full job description here — responsibilities, requirements, qualifications, tech stack..."></textarea>
      </div>

    </div>

    <div class="error-box" id="inp-err"></div>
    <button class="btn-primary" onclick="runAnalysis()">Analyze &amp; Optimize Resume →</button>
  </div>

  <!-- LOADING -->
  <div id="sec-load">
    <div class="progress-track"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-text" id="prog-txt">Starting analysis...</div>
  </div>

  <!-- RESULTS -->
  <div id="sec-results">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('overview', this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('bullets', this)">Rewritten Bullets</button>
      <button class="tab-btn" onclick="switchTab('keywords', this)">Keywords</button>
      <button class="tab-btn" onclick="switchTab('ats', this)">ATS Checks</button>
      <button class="tab-btn" onclick="switchTab('gaps', this)">Gap Analysis</button>
      <button class="tab-btn" onclick="switchTab('full', this)">Full Resume</button>
    </div>

    <div id="tab-overview" class="tab-panel active"></div>
    <div id="tab-bullets"  class="tab-panel"></div>
    <div id="tab-keywords" class="tab-panel"></div>
    <div id="tab-ats"      class="tab-panel"></div>
    <div id="tab-gaps"     class="tab-panel"></div>
    <div id="tab-full"     class="tab-panel"></div>

    <div class="reset-row">
      <button class="btn-secondary" onclick="reset()">← Analyze Another Resume</button>
    </div>
  </div>

</div><!-- /shell -->

<script>
  // ── PDF.js worker ────────────────────────────────────────────────────────
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── File reading ─────────────────────────────────────────────────────────
  async function loadFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const dn  = document.getElementById('drop-name');
    const dz  = document.getElementById('drop-zone');
    dn.textContent = '⏳ Reading ' + file.name + '...';
    dn.style.display = 'block';
    dn.style.color = '#BA7517';
    try {
      let txt = '';
      if (ext === 'txt') {
        txt = await file.text();
      } else if (ext === 'docx') {
        const r = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
        txt = r.value;
      } else if (ext === 'pdf') {
        const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page    = await pdf.getPage(i);
          const content = await page.getTextContent();
          txt += content.items.map(x => x.str).join(' ') + '\n';
        }
      } else {
        txt = await file.text();
      }
      document.getElementById('resume-ta').value = txt.trim();
      dn.textContent = '✓ ' + file.name;
      dn.style.color = '#0F6E56';
      dz.classList.add('loaded');
      document.getElementById('drop-icon').textContent =
        ext === 'pdf' ? '📕' : ext === 'docx' ? '📘' : '📄';
    } catch (e) {
      dn.textContent = '✗ ' + e.message;
      dn.style.color = '#A32D2D';
    }
  }

  // ── Step indicator ───────────────────────────────────────────────────────
  function setStep(n) {
    [1,2,3].forEach(i => {
      const el = document.getElementById('sp' + i);
      el.className = 'step-pill' + (i < n ? ' done' : i === n ? ' active' : '');
    });
  }

  // ── Tab switching ────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── Reset ────────────────────────────────────────────────────────────────
  function reset() {
    document.getElementById('sec-input').style.display   = 'block';
    document.getElementById('sec-results').style.display = 'none';
    document.getElementById('sec-load').style.display    = 'none';
    document.getElementById('inp-err').style.display     = 'none';
    document.getElementById('resume-ta').value = '';
    document.getElementById('jd-ta').value     = '';
    document.getElementById('drop-name').style.display   = 'none';
    document.getElementById('drop-zone').classList.remove('loaded');
    document.getElementById('drop-icon').textContent = '📄';
    document.getElementById('file-inp').value = '';
    setStep(1);
    // reset tab to overview
    document.querySelectorAll('.tab-btn')[0].click();
  }

  // ── Progress ─────────────────────────────────────────────────────────────
  function setP(pct, msg) {
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-txt').textContent  = msg;
  }

  function showErr(msg) {
    const el = document.getElementById('inp-err');
    el.textContent    = msg;
    el.style.display  = 'block';
  }

  // ── Score color ──────────────────────────────────────────────────────────
  function sc(n) { return n >= 75 ? 'c-green' : n >= 50 ? 'c-amber' : 'c-red'; }

  // ── Main analysis ─────────────────────────────────────────────────────────
  async function runAnalysis() {
    const resume = document.getElementById('resume-ta').value.trim();
    const jd     = document.getElementById('jd-ta').value.trim();
    document.getElementById('inp-err').style.display = 'none';

    if (!resume)          { showErr('Please upload a resume file or paste your resume text.'); return; }
    if (resume.length < 80) { showErr('Resume looks too short — please paste the full text.'); return; }
    if (!jd)              { showErr('Please paste the job description.'); return; }

    document.getElementById('sec-input').style.display = 'none';
    document.getElementById('sec-load').style.display  = 'block';
    setStep(2);

    const steps = [
      [10,  'Reading resume content...'],
      [22,  'Extracting job description keywords...'],
      [38,  'Identifying weak bullet points...'],
      [54,  'Rewriting with achievement framing...'],
      [70,  'Running ATS compatibility checks...'],
      [84,  'Detecting skill & experience gaps...'],
      [94,  'Finalizing optimized resume...'],
    ];
    let si = 0;
    const iv = setInterval(() => { if (si < steps.length) setP(...steps[si++]); }, 1800);

    const prompt = `You are an expert resume optimizer and ATS specialist. Analyze the resume against the job description. Return ONLY valid JSON — no markdown fences, no extra text.

RESUME:
${resume.slice(0, 6000)}

JOB DESCRIPTION:
${jd.slice(0, 3000)}

Return this exact JSON:
{
  "scores": { "overall": 0, "ats": 0, "keywords": 0, "achievements": 0 },
  "summary": "2-3 sentence honest assessment",
  "rewritten_bullets": [
    { "section": "Company Name", "original": "exact original bullet", "improved": "rewritten version", "issue": "vague|no metrics|passive|missing leadership" }
  ],
  "metrics_prompts": ["specific question to get a missing number"],
  "keywords": {
    "top15": ["k1","k2","k3","k4","k5","k6","k7","k8","k9","k10","k11","k12","k13","k14","k15"],
    "present": ["keywords already in resume"],
    "missing": ["keywords not in resume"]
  },
  "ats_issues": [
    { "severity": "high|medium|low", "category": "Title|Keywords|Formatting|Language|Structure", "description": "specific issue", "fix": "exact fix" }
  ],
  "gaps": [
    { "skill": "skill name", "importance": "critical|important|nice-to-have", "suggestion": "concrete suggestion" }
  ],
  "optimized_resume": "Full optimized resume preserving the EXACT original layout and sections. Only improve content — stronger verbs, leadership language, keywords woven in naturally. Use real newlines."
}

Rules:
- Rewrite 5-7 bullets across multiple jobs
- Exactly 15 keywords from the JD
- Flag any title mismatch as HIGH severity
- optimized_resume must keep all original sections in the same order`;

    try {
      const resp = await fetch('/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model:      'claude-opus-4-5',
          max_tokens: 6000,
          messages:   [{ role: 'user', content: prompt }]
        })
      });

      clearInterval(iv);

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || 'Server error ' + resp.status);
      }

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      let raw = data.content.map(b => b.text || '').join('').trim();
      raw = raw.replace(/^```json\s*/,'').replace(/^```/,'').replace(/```$/,'').trim();
      const result = JSON.parse(raw);

      setP(100, 'Done!');
      setTimeout(() => {
        document.getElementById('sec-load').style.display    = 'none';
        document.getElementById('sec-results').style.display = 'block';
        setStep(3);
        renderResults(result);
      }, 400);

    } catch (e) {
      clearInterval(iv);
      document.getElementById('sec-load').style.display  = 'none';
      document.getElementById('sec-input').style.display = 'block';
      setStep(1);
      showErr('Error: ' + e.message);
    }
  }

  // ── Render results ────────────────────────────────────────────────────────
  function renderResults(d) {
    renderOverview(d);
    renderBullets(d);
    renderKeywords(d);
    renderATS(d);
    renderGaps(d);
    renderFull(d);
  }

  function renderOverview(d) {
    const s = d.scores;
    document.getElementById('tab-overview').innerHTML = `
      <div class="score-grid">
        ${[['Overall',s.overall],['ATS',s.ats],['Keywords',s.keywords],['Achievements',s.achievements]].map(([l,v]) => `
          <div class="score-card">
            <div class="score-num ${sc(v)}">${v}</div>
            <div class="score-lbl">${l.toLowerCase()}</div>
          </div>`).join('')}
      </div>
      <div class="assessment-box">
        <div class="mini-lbl">Assessment</div>
        <p>${d.summary}</p>
      </div>
      ${d.metrics_prompts?.length ? `
      <div class="metrics-box">
        <div class="mtitle">Metrics needed to maximize impact</div>
        <ul>${d.metrics_prompts.map(q => `<li>${q}</li>`).join('')}</ul>
      </div>` : ''}
      <div class="mini-stats">
        <div class="mini-stat"><div class="ms-lbl">bullets rewritten</div><div class="ms-val c-green">${(d.rewritten_bullets||[]).length}</div></div>
        <div class="mini-stat"><div class="ms-lbl">keywords missing</div><div class="ms-val c-red">${(d.keywords?.missing||[]).length}</div></div>
        <div class="mini-stat"><div class="ms-lbl">gaps found</div><div class="ms-val c-amber">${(d.gaps||[]).length}</div></div>
      </div>`;
  }

  function renderBullets(d) {
    const bullets = d.rewritten_bullets || [];
    document.getElementById('tab-bullets').innerHTML = `
      <div class="sec-title">Rewritten Bullet Points <span class="badge badge-green">${bullets.length} improved</span></div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem;font-family:var(--mono);">Red = original &nbsp;·&nbsp; Green = optimized</p>
      ${bullets.map(b => `
        <div class="bullet-card">
          <div class="b-before">
            <span class="b-section">${b.section || ''}</span>
            <span class="badge badge-red" style="float:right;margin-left:8px;">${b.issue || 'weak'}</span>
            ${b.original}
          </div>
          <div class="b-after">${b.improved}</div>
        </div>`).join('')}`;
  }

  function renderKeywords(d) {
    const kw      = d.keywords || {};
    const present = (kw.present || []).map(k => k.toLowerCase());
    document.getElementById('tab-keywords').innerHTML = `
      <div class="sec-title">Top 15 Keywords from Job Description</div>
      <div class="kw-wrap">
        ${(kw.top15 || []).map(k =>
          `<span class="kw ${present.includes(k.toLowerCase()) ? 'kw-ok' : 'kw-no'}">${k}</span>`
        ).join('')}
      </div>
      <div class="kw-split">
        <div>
          <div class="sec-title">Present in Resume <span class="badge badge-green">${(kw.present||[]).length}</span></div>
          <div class="kw-wrap">${(kw.present||[]).map(k=>`<span class="kw kw-ok">${k}</span>`).join('') || '<span style="font-size:12px;color:var(--text-muted)">None detected</span>'}</div>
        </div>
        <div>
          <div class="sec-title">Missing — Add These <span class="badge badge-red">${(kw.missing||[]).length}</span></div>
          <div class="kw-wrap">${(kw.missing||[]).map(k=>`<span class="kw kw-no">${k}</span>`).join('') || '<span style="font-size:12px;color:var(--text-muted)">All present!</span>'}</div>
          ${(kw.missing||[]).length ? '<p style="font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:6px;">Integrate naturally into experience bullets — not just a Skills section.</p>' : ''}
        </div>
      </div>`;
  }

  function renderATS(d) {
    const issues = d.ats_issues || [];
    const sev    = { high: ['badge-red','🔴'], medium: ['badge-amber','🟡'], low: ['badge-blue','🔵'] };
    document.getElementById('tab-ats').innerHTML = `
      <div class="sec-title">
        ATS Compatibility Issues
        <span class="badge badge-red">${issues.filter(i=>i.severity==='high').length} high</span>
        <span class="badge badge-amber">${issues.filter(i=>i.severity==='medium').length} medium</span>
      </div>
      ${issues.map(i => {
        const [cls, ic] = sev[i.severity] || ['badge-blue','🔵'];
        return `<div class="iss-item">
          <div class="iss-icon">${ic}</div>
          <div>
            <div class="iss-cat">${i.category} · <span class="badge ${cls}">${i.severity}</span></div>
            <div class="iss-desc">${i.description}</div>
            <div class="iss-fix">→ ${i.fix}</div>
          </div>
        </div>`;
      }).join('') || '<p style="font-size:13px;color:var(--text-muted)">No major ATS issues detected.</p>'}`;
  }

  function renderGaps(d) {
    const gaps = d.gaps || [];
    const imp  = { critical: ['badge-red','Critical'], important: ['badge-amber','Important'], 'nice-to-have': ['badge-blue','Nice to have'] };
    document.getElementById('tab-gaps').innerHTML = `
      <div class="sec-title">Skill &amp; Experience Gaps</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem;font-family:var(--mono);">Missing skills or experience from the JD not well-represented in your resume.</p>
      ${gaps.map(g => {
        const [cls, lbl] = imp[g.importance] || ['badge-blue','Other'];
        return `<div class="gap-item">
          <div class="gap-header">
            <span class="gap-skill">${g.skill}</span>
            <span class="badge ${cls}">${lbl}</span>
          </div>
          <div class="gap-sug">${g.suggestion}</div>
        </div>`;
      }).join('') || '<p style="font-size:13px;color:var(--text-muted)">No significant gaps detected!</p>'}`;
  }

  function renderFull(d) {
    const txt = (d.optimized_resume || '').replace(/\\n/g, '\n');
    document.getElementById('tab-full').innerHTML = `
      <div class="sec-title">Optimized Full Resume</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-family:var(--mono);">All improvements applied — ATS-optimized, achievement-focused, keywords integrated.</p>
      <pre class="resume-pre" id="opt-pre">${txt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
      <div class="btn-row">
        <button class="btn-secondary" onclick="copyFull(this)">Copy full resume</button>
        <button class="btn-accent"    onclick="downloadTxt()">⬇ Download .txt</button>
      </div>`;
  }

  function copyFull(btn) {
    navigator.clipboard.writeText(document.getElementById('opt-pre').textContent)
      .then(() => { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy full resume'; }, 2000); });
  }

  function downloadTxt() {
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(new Blob([document.getElementById('opt-pre').textContent], { type: 'text/plain' }));
    a.download = 'resume_optimized.txt';
    a.click();
  }
</script>
</body>
</html>
